<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GG Verse Official</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0d0d0d;
      color: white;
      line-height: 1.6;
    }

    header {
    background: linear-gradient(rgba(0,0,0,0.82), rgba(0,0,0,0.82)),
    url("https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    position: relative;
}
  header > div {
    background: rgba(0,0,0,0.45);
    padding: 40px 60px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(212,175,55,0.25);
    max-width: 950px;
    margin: 0 auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
header h1 {
    font-size: 72px;
    color: gold;
    margin-bottom: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

  header h2 {
    font-size: 52px;
    line-height: 1.25;
    font-weight: 700;
    max-width: 900px;
    margin: 0 auto 25px;
}
    .hero-logo {
    width: 340px;
    max-width: 90%;
    margin-bottom: 25px;
}
.hero-logo {
    filter: drop-shadow(0 0 15px rgba(212,175,55,0.25));
}
    .hero-categories {
    font-size: 14px;
    letter-spacing: 1px;
    opacity: 0.8;
}
    .btn {
    letter-spacing: 1px;
    text-transform: uppercase;
}
    header p {
      font-size: 18px;
      max-width: 700px;
      margin: auto;
    }

    .btn {
    display: inline-block;
    margin: 30px 10px 0;
    padding: 14px 30px;
    border: 1px solid #d4af37;
    color: #d4af37;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s ease;
}

.btn:hover {
    background: #d4af37;
    color: #000;
    transform: translateY(-4px);
}

    nav {
      background: #111;
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      margin: 0 12px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: gold;
    }

    section {
      padding: 70px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      color: gold;
      text-align: center;
      font-size: 34px;
      margin-bottom: 25px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1a1a1a;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #333;
    }

    .card h3 {
      color: gold;
      margin-bottom: 10px;
    }

    .socials {
      text-align: center;
    }

    .socials a {
      display: inline-block;
      margin: 10px;
      padding: 12px 22px;
      background: gold;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    footer {
      background: #050505;
      text-align: center;
      padding: 25px;
      color: #aaa;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 42px;
      }

      header h2 {
        font-size: 30px;
      }

      nav a {
        display: block;
        margin: 8px 0;
      }
      .quote{
    color:#d4af37;
    font-style:italic;
    margin:15px 0;
}
    }

    url("https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
